<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eigennexus — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0c0d0f;--dark:#161820;--charcoal:#23262e;
  --border:#2e3139;--muted:#5a5f6e;--body:#9aa0b0;
  --light:#c8cdd8;--white:#f0ede8;--teal:#00c2b3;
  --red:#ff5b5b;--green:#3ecf8e;
  --sans:'Instrument Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{font-size:15px;}
body{font-family:var(--sans);background:var(--black);color:var(--body);min-height:100vh;-webkit-font-smoothing:antialiased;}
#lock{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1.25rem;padding:2rem;
}
#lock h2{font-size:1.25rem;color:var(--white);font-weight:500;letter-spacing:.02em;}
#lock p{font-size:.85rem;color:var(--muted);}
#pw-wrap{display:flex;gap:.625rem;}
#pw-input{
  padding:.7rem 1rem;background:var(--dark);border:1px solid var(--border);
  color:var(--white);font-family:var(--mono);font-size:.875rem;
  border-radius:2px;outline:none;width:220px;transition:border-color .2s;
}
#pw-input:focus{border-color:var(--teal);}
#pw-btn{
  padding:.7rem 1.25rem;background:var(--teal);color:var(--black);
  border:none;font-family:var(--sans);font-size:.875rem;font-weight:600;
  cursor:pointer;border-radius:2px;
}
#pw-err{font-size:.8rem;color:var(--red);}
#panel{display:none;padding:2.5rem 3rem;max-width:1100px;margin:0 auto;}
.p-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
.p-header h1{font-size:1.375rem;color:var(--white);font-weight:500;}
.p-logo{font-family:var(--mono);font-size:.65rem;color:var(--teal);letter-spacing:.15em;}
.tabs{display:flex;gap:0;margin-bottom:2rem;border:1px solid var(--border);border-radius:2px;overflow:hidden;width:fit-content;}
.tab{
  padding:.6rem 1.5rem;font-size:.8rem;font-weight:500;letter-spacing:.06em;
  text-transform:uppercase;cursor:pointer;color:var(--muted);background:var(--dark);
  transition:background .2s,color .2s;border:none;
}
.tab.active{background:var(--teal);color:var(--black);}
.stats-row{display:flex;gap:1px;background:var(--border);margin-bottom:2rem;border:1px solid var(--border);border-radius:2px;overflow:hidden;}
.stat{flex:1;background:var(--dark);padding:1.25rem 1.5rem;text-align:center;}
.stat-n{font-family:var(--mono);font-size:1.75rem;color:var(--white);line-height:1;margin-bottom:.25rem;}
.stat-l{font-size:.7rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;}
table{width:100%;border-collapse:collapse;font-size:.8rem;}
th{
  text-align:left;padding:.75rem 1rem;font-size:.65rem;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  background:var(--charcoal);border-bottom:1px solid var(--border);
}
td{padding:.875rem 1rem;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.55;}
tr:hover td{background:var(--dark);}
.td-name{color:var(--white);font-weight:500;}
.td-email{color:var(--teal);}
.td-badge{
  display:inline-block;padding:.2rem .6rem;border-radius:2px;
  font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
}
.badge-ins{background:rgba(0,194,179,.15);color:var(--teal);}
.badge-oth{background:rgba(255,255,255,.06);color:var(--muted);}
.td-msg{color:var(--muted);font-size:.775rem;max-width:260px;}
.td-ts{font-family:var(--mono);font-size:.65rem;color:var(--muted);}
.empty{text-align:center;padding:4rem;color:var(--muted);font-size:.9rem;}
.dl-btn{
  padding:.5rem 1rem;background:var(--charcoal);border:1px solid var(--border);
  color:var(--light);font-family:var(--sans);font-size:.75rem;font-weight:500;
  cursor:pointer;border-radius:2px;letter-spacing:.05em;transition:border-color .2s;
}
.dl-btn:hover{border-color:var(--teal);}
.logout{
  padding:.45rem 1rem;background:none;border:1px solid var(--border);
  color:var(--muted);font-family:var(--sans);font-size:.75rem;
  cursor:pointer;border-radius:2px;transition:border-color .2s,color .2s;
}
.logout:hover{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock">
  <p class="p-logo">EIGENNEXUS &nbsp;&middot;&nbsp; ADMIN</p>
  <h2>Enter access password</h2>
  <p>This panel is private. Do not share this URL.</p>
  <div id="pw-wrap">
    <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()">
    <button id="pw-btn" onclick="unlock()">Enter</button>
  </div>
  <span id="pw-err"></span>
</div>

<!-- ADMIN PANEL -->
<div id="panel">
  <div class="p-header">
    <div>
      <span class="p-logo">EIGENNEXUS &nbsp;&middot;&nbsp; ADMIN</span>
      <h1 style="margin-top:.35rem">Site Analytics</h1>
    </div>
    <div style="display:flex;gap:.75rem;align-items:center;">
      <button class="dl-btn" onclick="exportCSV('subs')">Export submissions CSV</button>
      <button class="dl-btn" onclick="exportCSV('visits')">Export visits CSV</button>
      <button class="logout" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('subs',this)">Form submissions</button>
    <button class="tab" onclick="showTab('visits',this)">Visitor log</button>
  </div>

  <!-- SUBMISSIONS TAB -->
  <div id="tab-subs">
    <div class="stats-row" id="sub-stats"></div>
    <table id="subs-table">
      <thead>
        <tr>
          <th>Name</th><th>Email</th><th>Company</th><th>Phone</th>
          <th>Industry</th><th>Message</th><th>Submitted</th>
        </tr>
      </thead>
      <tbody id="subs-body"></tbody>
    </table>
    <div class="empty" id="subs-empty" style="display:none">No submissions yet.</div>
  </div>

  <!-- VISITS TAB -->
  <div id="tab-visits" style="display:none">
    <div class="stats-row" id="vis-stats"></div>
    <table id="vis-table">
      <thead>
        <tr><th>#</th><th>Date / Time</th><th>City</th><th>Region</th><th>Country</th><th>IP</th><th>Referrer</th></tr>
      </thead>
      <tbody id="vis-body"></tbody>
    </table>
    <div class="empty" id="vis-empty" style="display:none">No visits recorded yet.</div>
  </div>
</div>

<script>
const PASS = 'eigennexus2025';
const SK_SUBS   = 'en_submissions_v1';
const SK_VISITS = 'en_visits_v1';
let currentTab = 'subs';

function unlock() {
  const v = document.getElementById('pw-input').value;
  if(v === PASS) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    renderAll();
  } else {
    document.getElementById('pw-err').textContent = 'Incorrect password.';
  }
}

function logout() {
  document.getElementById('panel').style.display = 'none';
  document.getElementById('lock').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

function load(key) { try { return JSON.parse(localStorage.getItem(key)||'[]'); } catch(e){return[];} }

function fmt(iso) {
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ' ' +
         d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function showTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-subs').style.display   = tab === 'subs'   ? 'block' : 'none';
  document.getElementById('tab-visits').style.display = tab === 'visits' ? 'block' : 'none';
}

function renderAll() {
  renderSubs();
  renderVisits();
}

function renderSubs() {
  const data = load(SK_SUBS);
  const today = new Date().toISOString().slice(0,10);
  const todayCount = data.filter(s => s.ts && s.ts.slice(0,10) === today).length;

  document.getElementById('sub-stats').innerHTML = `
    <div class="stat"><div class="stat-n">${data.length}</div><div class="stat-l">Total submissions</div></div>
    <div class="stat"><div class="stat-n">${todayCount}</div><div class="stat-l">Today</div></div>
    <div class="stat"><div class="stat-n">${[...new Set(data.map(s=>s.email).filter(Boolean))].length}</div><div class="stat-l">Unique emails</div></div>
  `;

  const tbody = document.getElementById('subs-body');
  if(!data.length) {
    document.getElementById('subs-empty').style.display = 'block';
    document.getElementById('subs-table').style.display = 'none';
    return;
  }
  const rows = [...data].reverse().map(s => `
    <tr>
      <td class="td-name">${esc(s.name||'')}</td>
      <td class="td-email">${esc(s.email||'')}</td>
      <td>${esc(s.company||'')}</td>
      <td>${esc(s.phone||'')}</td>
      <td><span class="td-badge ${s.industry==='Insurance'?'badge-ins':'badge-oth'}">${esc(s.industry||'')}</span></td>
      <td class="td-msg">${esc(s.message||'').slice(0,120)}</td>
      <td class="td-ts">${fmt(s.ts)}</td>
    </tr>
  `).join('');
  tbody.innerHTML = rows;
}

function renderVisits() {
  const data = load(SK_VISITS);
  const today = new Date().toISOString().slice(0,10);
  const todayCount = data.filter(v => v.date === today).length;
  const countries = [...new Set(data.map(v=>v.country).filter(Boolean))].length;

  document.getElementById('vis-stats').innerHTML = `
    <div class="stat"><div class="stat-n">${data.length}</div><div class="stat-l">Total visits</div></div>
    <div class="stat"><div class="stat-n">${todayCount}</div><div class="stat-l">Today</div></div>
    <div class="stat"><div class="stat-n">${countries}</div><div class="stat-l">Countries</div></div>
  `;

  const tbody = document.getElementById('vis-body');
  if(!data.length) {
    document.getElementById('vis-empty').style.display = 'block';
    document.getElementById('vis-table').style.display = 'none';
    return;
  }
  const rows = [...data].reverse().map((v,i) => `
    <tr>
      <td class="td-ts">#${data.length - i}</td>
      <td class="td-ts">${fmt(v.ts)}</td>
      <td>${esc(v.city||'')}</td>
      <td>${esc(v.region||'')}</td>
      <td>${esc(v.country||'')}</td>
      <td class="td-ts">${esc(v.ip||'')}</td>
      <td class="td-msg">${esc(v.ref||'direct')}</td>
    </tr>
  `).join('');
  tbody.innerHTML = rows;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportCSV(type) {
  const key   = type === 'subs' ? SK_SUBS : SK_VISITS;
  const data  = load(key);
  if(!data.length) { alert('No data to export yet.'); return; }

  const headers = Object.keys(data[0]);
  const rows    = data.map(r => headers.map(h => '"' + String(r[h]||'').replace(/"/g,'""') + '"').join(','));
  const csv     = [headers.join(','), ...rows].join('\n');
  const blob    = new Blob([csv], {type:'text/csv'});
  const a       = document.createElement('a');
  a.href        = URL.createObjectURL(blob);
  a.download    = `eigennexus_${type}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
